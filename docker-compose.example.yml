services:

  app:
    image: argon/keep-it
    build: ./app
    volumes:
      - ./app:/app
    ports:
      - 3000:3000
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3000

  sample_db:
    image: postgres:16
    ports:
      - 5432:5432
    volumes:
      - sample_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres

volumes:
  sample_data:
